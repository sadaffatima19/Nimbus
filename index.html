<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nimbus — Weather Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Animated Sky Background -->
  <div class="sky-bg">
    <div class="clouds-layer">
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="cloud cloud-3"></div>
      <div class="cloud cloud-4"></div>
    </div>
    <div class="sun-orb"></div>
    <div class="particles" id="particles"></div>
  </div>

  <!-- Main App -->
  <div class="app-wrapper">

    <!-- Header -->
    <header class="app-header">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">Nimbus</span>
      </div>
      <p class="tagline">Your sky, decoded.</p>
    </header>

    <!-- Search Bar -->
    <div class="search-section">
      <div class="search-card">
        <div class="search-input-wrap">
          <span class="search-icon">⌕</span>
          <input
            type="text"
            id="cityInput"
            placeholder="Search a city…"
            autocomplete="off"
          />
        </div>
        <button class="btn-search" id="searchBtn">Search</button>
        <button class="btn-geo" id="geoBtn" title="Use my location">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
            <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z" opacity=".25"/>
          </svg>
        </button>
      </div>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <!-- Loading Spinner -->
    <div class="loader-wrap" id="loader">
      <div class="loader-ring"></div>
      <p>Fetching skies…</p>
    </div>

    <!-- Weather Content -->
    <main class="weather-content" id="weatherContent" style="display:none;">

      <!-- Current Weather Card -->
      <section class="current-card" id="currentCard">
        <div class="current-left">
          <div class="city-name" id="cityName">—</div>
          <div class="country-date">
            <span id="countryCode">—</span>
            <span class="separator">·</span>
            <span id="currentDate">—</span>
          </div>
          <div class="weather-desc" id="weatherDesc">—</div>
          <div class="temp-display">
            <span class="temp-value" id="tempValue">—</span>
            <span class="temp-unit">°C</span>
          </div>
          <div class="feels-like">Feels like <span id="feelsLike">—</span>°C</div>
        </div>

        <div class="current-right">
          <div class="weather-icon-3d" id="weatherIcon3d">
            <div class="icon-scene" id="iconScene"></div>
          </div>
          <div class="stats-grid">
            <div class="stat-pill">
              <span class="stat-label">Humidity</span>
              <span class="stat-value" id="humidity">—</span>
            </div>
            <div class="stat-pill">
              <span class="stat-label">Wind</span>
              <span class="stat-value" id="windSpeed">—</span>
            </div>
            <div class="stat-pill">
              <span class="stat-label">Pressure</span>
              <span class="stat-value" id="pressure">—</span>
            </div>
            <div class="stat-pill">
              <span class="stat-label">Visibility</span>
              <span class="stat-value" id="visibility">—</span>
            </div>
          </div>
        </div>
      </section>

      <!-- 5-Day Forecast -->
      <section class="forecast-section">
        <h2 class="section-title">5-Day Forecast</h2>
        <div class="forecast-grid" id="forecastGrid">
          <!-- Injected by JS -->
        </div>
      </section>

      <!-- Hourly Strip (first 8 readings) -->
      <section class="hourly-section">
        <h2 class="section-title">Hourly</h2>
        <div class="hourly-strip" id="hourlyStrip">
          <!-- Injected by JS -->
        </div>
      </section>

    </main>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <div class="empty-sun"></div>
        <div class="empty-cloud"></div>
      </div>
      <p>Search a city to see the weather</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
